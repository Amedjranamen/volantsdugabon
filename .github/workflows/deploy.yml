name: Deploy Frontend and Admin Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend (Firebase Hosting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install & Build
        run: |
          cd ./
          npm ci
          npm run build
      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v1.5.0
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-admin-server:
    name: Build & Deploy Admin Server (Cloud Run)
    runs-on: ubuntu-latest
    needs: deploy-frontend
    env:
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./admin-server
          push: true
          tags: gcr.io/${{ env.GCP_PROJECT }}/admin-server:${{ github.sha }}
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: admin-server
          image: gcr.io/${{ env.GCP_PROJECT }}/admin-server:${{ github.sha }}
          project_id: ${{ env.GCP_PROJECT }}
          region: ${{ secrets.GCP_REGION }}
        env:
          CLOUD_RUN_ALLOW_UNAUTHENTICATED: 'true'
